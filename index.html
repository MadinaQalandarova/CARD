<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Digital Card</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card-outer">
        <div class="avatar" aria-hidden="true"></div>
        <div class="card">
          <h1>Madina Qalandarova</h1>
          <p class="subtitle">Frontend Developer & Linux Administrator</p>

          <ul class="contacts">
            <li>
              <a
                href="https://qalandarova.uz/"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="icon">🌐</span>
                <span class="text">Portfolio</span>
              </a>
            </li>
            <li>
              <a
                href="https://t.me/qalandarovaaa_m"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="icon"
                  ><img src="telegram.png" alt="Telegram"
                /></span>
                <span class="text">Telegram</span>
              </a>
            </li>
            <li>
              <a
                href="https://github.com/MadinaQalandarova"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="icon"><img src="github.png" alt="GitHub" /></span>
                <span class="text">GitHub</span>
              </a>
            </li>
            <li>
              <a
                href="mailto:qalandarovaam100@gmail.com"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="icon">@</span>
                <span class="text">Email</span>
              </a>
            </li>
          </ul>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
